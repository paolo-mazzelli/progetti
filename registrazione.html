<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modulo di Registrazione</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body id="reg">

  <div class="container">
    <h1 id="h1reg">Registrati</h1>
    <form action="#">
      <div class="form-group">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Inserisci il tuo nome" required>
      </div>

      <div class="form-group">
        <label for="cognome">Cognome:</label>
        <input type="text" id="cognome" name="cognome" placeholder="Inserisci il tuo cognome" required>
      </div>

      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Inserisci la tua email" required>
      </div>

      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Crea una password" required>
      </div>

      <div class="form-group">
        <label for="confermaPassword">Conferma Password:</label>
        <input type="password" id="confermaPassword" name="confermaPassword" placeholder="Conferma la tua password" required>
      </div>

      <div class="form-group">
        <label for="età">Età:</label>
        <select id="età" name="età" required>
          <option value="14-18">14-18</option>
          <option value="18-25">18-25</option>
          <option value="25-45">25-45</option>
          <option value="45-65">45-65</option>
          <option value="65+">65+</option>
        </select>
      </div>

      <div class="form-group radio-group">
        <label>Sesso:</label>
        <div>
          <label for="Maschio">
			<input type="radio" id="maschio" name="sesso" value="maschio"> Maschio
		  </label>
          <label for="Femmina">
			<input type="radio" id="femmina" name="sesso" value="femmina"> Femmina
		  </label>
          <label for="Altro">
			<input type="radio" id="altro" name="sesso" value="altro"> Altro
		  </label>
        </div>
      </div>

      <div class="form-group terms">
        <label for="termini">
          <input type="checkbox" id="termini" name="termini" required>
          Accetto i termini e le condizioni
        </label>
      </div>

	  <a href="home.html"><button type="submit">Registrati</button></a>

    <button type="button"><a href="index.html">Torna alla pagina principale</a></button>
	  
	  <button type="button" id="showFeedbackBtn">Mostra Feedback</button>
    </form>
    <div id="feedback"></div>
</body>
</html>
